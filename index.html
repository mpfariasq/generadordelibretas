<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Libretas de Calificaciones - Colegio San José</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM UMD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone para compilar JSX en el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.17/babel.min.js"></script>
    
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <!-- SheetJS (XLSX Reader) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- JSZip para empaquetado masivo de PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif-elegant {
            font-family: 'Playfair Display', serif;
        }
        /* Clases institucionales bordo/vino */
        .bg-burgundy {
            background-color: #800020 !important;
        }
        .hover\:bg-burgundy-dark:hover {
            background-color: #600018 !important;
        }
        .text-burgundy {
            color: #800020 !important;
        }
        .border-burgundy {
            border-color: #800020 !important;
        }
        .bg-burgundy-light {
            background-color: #fdf5f6 !important;
        }
        .border-burgundy-light {
            border-color: #fbc6cd !important;
        }
        .focus-ring-burgundy:focus {
            --tw-ring-color: #800020 !important;
            border-color: #800020 !important;
        }

        /* Estilizar barra de desplazamiento para ver todas las notas */
        .custom-scrollbar::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 6px;
            border: 2px solid #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #800020;
        }

        @media print {
            body {
                background-color: white !important;
                color: black !important;
            }
            .no-print {
                display: none !important;
            }
            .print-card {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Diccionario nativo de iconos vectoriales para evitar interferencias en el DOM con Lucide clásico
        function Icon({ name, className = "w-4 h-4" }) {
            const attrs = {
                className,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: "2",
                strokeLinecap: "round",
                strokeLinejoin: "round"
            };

            switch (name) {
                case "school":
                    return (
                        <svg {...attrs}>
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    );
                case "image":
                    return (
                        <svg {...attrs}>
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    );
                case "upload-cloud":
                    return (
                        <svg {...attrs}>
                            <polyline points="16 16 12 12 8 16" />
                            <line x1="12" y1="12" x2="12" y2="21" />
                            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                            <polyline points="16 16 12 12 8 16" />
                        </svg>
                    );
                case "plus-circle":
                    return (
                        <svg {...attrs}>
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                    );
                case "search":
                    return (
                        <svg {...attrs}>
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    );
                case "chevron-right":
                    return (
                        <svg {...attrs}>
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    );
                case "folder-archive":
                    return (
                        <svg {...attrs}>
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                            <circle cx="10" cy="14" r="2" />
                            <line x1="12" y1="14" x2="15" y2="14" />
                        </svg>
                    );
                case "file-text":
                    return (
                        <svg {...attrs}>
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                    );
                case "printer":
                    return (
                        <svg {...attrs}>
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                            <rect x="6" y="14" width="12" height="8" />
                        </svg>
                    );
                case "trash-2":
                    return (
                        <svg {...attrs}>
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            <line x1="10" y1="11" x2="10" y2="17" />
                            <line x1="14" y1="11" x2="14" y2="17" />
                        </svg>
                    );
                case "check-circle":
                    return (
                        <svg {...attrs}>
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg>
                    );
                case "alert-circle":
                    return (
                        <svg {...attrs}>
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                    );
                case "file-spreadsheet":
                    return (
                        <svg {...attrs}>
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="M8 13h2v2H8z" />
                            <path d="M14 13h2v2h-2z" />
                            <path d="M8 17h2v2H8z" />
                            <path d="M14 17h2v2h-2z" />
                        </svg>
                    );
                default:
                    return null;
            }
        }

        function App() {
            // Estados principales
            const [originalStudents, setOriginalStudents] = useState([]);
            const [students, setStudents] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [courseName, setCourseName] = useState("");
            const [logo, setLogo] = useState(localStorage.getItem('school_logo') || "");
            const [searchQuery, setSearchQuery] = useState("");
            const [toast, setToast] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [isBulkGenerating, setIsBulkGenerating] = useState(false);
            const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });
            
            // Estructura global de columnas dinámicas descubiertas en el Excel
            const [globalColumns, setGlobalColumns] = useState([]);
            // Agrupación de columnas por núcleo para las cabeceras de doble fila
            const [nucleoHeaders, setNucleoHeaders] = useState([]);

            // Sincronizar título de la pestaña
            useEffect(() => {
                if (courseName) {
                    document.title = `Libretas - ${courseName}`;
                } else {
                    document.title = "Generador de Libretas de Calificaciones - Colegio San José";
                }
            }, [courseName]);

            const showToast = (message, type = "success") => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4500);
            };

            // Formatear fecha actual de generación (DD/MM/AAAA)
            const getFormattedDate = () => {
                const today = new Date();
                const day = String(today.getDate()).padStart(2, '0');
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const year = today.getFullYear();
                return `${day}/${month}/${year}`;
            };

            // Validar si una nota es menor que 7 (contemplando formato numérico con coma de Excel castellano)
            const isBelowSeven = (val) => {
                if (val === undefined || val === null || val === "") return false;
                const normalized = val.toString().replace(',', '.').trim();
                const num = parseFloat(normalized);
                return !isNaN(num) && num < 7;
            };

            // Obtener el número de núcleo usando expresión regular de forma segura
            const getNucleoNumber = (nucleoStr) => {
                if (!nucleoStr) return 999;
                const match = nucleoStr.toString().match(/N[ÚU]CLEO\s*(\d+)/i);
                return match ? parseInt(match[1], 10) : 999;
            };

            // Compresión de imagen óptima para almacenamiento y generación rápida de PDFs
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 150;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.60);
                        
                        setLogo(compressedBase64);
                        localStorage.setItem('school_logo', compressedBase64);
                        showToast("Logo de la escuela configurado correctamente.", "success");
                    };
                };
                reader.readAsDataURL(file);
            };

            const removeLogo = () => {
                setLogo("");
                localStorage.removeItem('school_logo');
                showToast("Se removió el logo institucional.", "info");
            };

            // Motor inteligente avanzado para procesar múltiples pestañas de materias individuales
            const processExcelFile = (file) => {
                if (!file) return;

                const fileNameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                const formattedCourse = fileNameWithoutExt.replace(/_/g, " ").replace(/-/g, " ").toUpperCase();

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = e.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        
                        const studentMap = new Map(); // Llave: nombre en mayúsculas -> datos del estudiante
                        const columnsTracker = []; // Lista ordenada de todas las columnas únicas de calificaciones encontradas
                        const columnsKeysSeen = new Set();

                        // Escanear cada pestaña del archivo Excel (una para cada materia)
                        workbook.SheetNames.forEach(sheetName => {
                            const nameLower = sheetName.toLowerCase();
                            // Ignorar pestañas de síntesis generales vacías o de resumen
                            if (nameLower.includes("sintesis") || nameLower.includes("síntesis") || nameLower.includes("resumen")) {
                                return;
                            }

                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                            if (rows.length < 3) return;

                            // 1. Encontrar nombre oficial de la asignatura y docente
                            let materiaName = sheetName.trim();
                            let docenteName = "Docente s/d";

                            for (let r = 0; r < Math.min(10, rows.length); r++) {
                                const row = rows[r];
                                if (!row) continue;
                                for (let c = 0; c < row.length; c++) {
                                    const val = row[c];
                                    if (val && typeof val === 'string') {
                                        if (val.toUpperCase().includes("MATERIA:")) {
                                            materiaName = row[c + 1] || row[c + 2] || val.split(":")[1]?.trim() || sheetName;
                                            materiaName = materiaName.toString().trim();
                                        }
                                        if (val.toUpperCase().includes("DOCENTE:")) {
                                            docenteName = row[c + 1] || row[c + 2] || val.split(":")[1]?.trim() || "Docente s/d";
                                            docenteName = docenteName.toString().trim();
                                        }
                                    }
                                }
                            }

                            // 2. Identificar la cabecera de Alumnos y las columnas de Notas
                            let studentHeaderRowIdx = -1;
                            let studentNameColIdx = -1;

                            for (let r = 0; r < Math.min(15, rows.length); r++) {
                                const row = rows[r];
                                if (!row) continue;
                                const colIdx = row.findIndex(cell => {
                                    if (!cell) return false;
                                    const txt = cell.toString().toUpperCase();
                                    return txt.includes("ESTUDIANTE") || txt.includes("ALUMNO") || txt.includes("NOMBRE");
                                });
                                if (colIdx !== -1) {
                                    studentHeaderRowIdx = r;
                                    studentNameColIdx = colIdx;
                                    break;
                                }
                            }

                            if (studentHeaderRowIdx === -1 || studentNameColIdx === -1) {
                                return;
                            }

                            const headerRow = rows[studentHeaderRowIdx];
                            const subHeaderRow = rows[studentHeaderRowIdx + 1] || [];

                            // Encontrar todas las columnas de calificaciones (N1, N2, ..., NFN1, etc.)
                            const activeColsInSheet = []; // { colIdx, nucleo, subheader, key }
                            let currentNucleo = "NÚCLEO 1";

                            for (let c = studentNameColIdx + 1; c < Math.max(headerRow.length, subHeaderRow.length); c++) {
                                const headCell = headerRow[c] ? headerRow[c].toString().trim().toUpperCase() : "";
                                const subCell = subHeaderRow[c] ? subHeaderRow[c].toString().trim() : "";

                                if (headCell.includes("NÚCLEO") || headCell.includes("NUCLEO")) {
                                    currentNucleo = headerRow[c].toString().trim().toUpperCase();
                                }

                                if (subCell) {
                                    const uniqueKey = `${currentNucleo}_${subCell.toUpperCase()}`;
                                    activeColsInSheet.push({
                                        colIdx: c,
                                        nucleo: currentNucleo,
                                        subheader: subCell,
                                        key: uniqueKey
                                    });

                                    // Registrar de manera global si no lo hemos visto para alinear la matriz gigante
                                    if (!columnsKeysSeen.has(uniqueKey)) {
                                        columnsKeysSeen.add(uniqueKey);
                                        columnsTracker.push({
                                            nucleo: currentNucleo,
                                            subheader: subCell,
                                            key: uniqueKey
                                        });
                                    }
                                }
                            }

                            // 3. Registrar calificaciones de cada alumno en esta materia
                            for (let r = studentHeaderRowIdx + 2; r < rows.length; r++) {
                                const row = rows[r];
                                if (!row || !row[studentNameColIdx]) continue;

                                const rawName = row[studentNameColIdx].toString().trim();
                                if (rawName.toUpperCase().includes("ESTUDIANTE") || rawName.toUpperCase().includes("PROMEDIO") || rawName.toUpperCase().includes("DOCENTE")) {
                                    continue;
                                }

                                const normName = rawName.toUpperCase();
                                if (!studentMap.has(normName)) {
                                    studentMap.set(normName, {
                                        nombre: rawName,
                                        materias: {}
                                    });
                                }

                                const studentObj = studentMap.get(normName);
                                if (!studentObj.materias[materiaName]) {
                                    studentObj.materias[materiaName] = {
                                        docente: docenteName,
                                        calificaciones: {} // key -> valor
                                    };
                                }

                                activeColsInSheet.forEach(({ colIdx, key }) => {
                                    const val = row[colIdx];
                                    const grade = (val !== undefined && val !== null) ? val.toString().trim() : "";
                                    studentObj.materias[materiaName].calificaciones[key] = grade;
                                });
                            }
                        });

                        // ORDENAMIENTO DINÁMICO DE NÚCLEOS (Evita que el 7 aparezca primero)
                        columnsTracker.sort((a, b) => {
                            const numA = getNucleoNumber(a.nucleo);
                            const numB = getNucleoNumber(b.nucleo);
                            if (numA !== numB) {
                                return numA - numB;
                            }
                            return a.subheader.localeCompare(b.subheader, undefined, { numeric: true });
                        });

                        // Agrupar núcleos para renderizar headers con colspan
                        const headersAgrupados = [];
                        columnsTracker.forEach(col => {
                            const last = headersAgrupados[headersAgrupados.length - 1];
                            if (last && last.name === col.nucleo) {
                                last.colspan += 1;
                            } else {
                                headersAgrupados.push({ name: col.nucleo, colspan: 1 });
                            }
                        });

                        const parsedStudents = Array.from(studentMap.values());
                        if (parsedStudents.length === 0) {
                            showToast("No se encontraron datos en las pestañas de materias del Excel.", "error");
                            return;
                        }

                        // Ordenar alumnos alfabéticamente
                        parsedStudents.sort((a, b) => a.nombre.localeCompare(b.nombre));

                        setGlobalColumns(columnsTracker);
                        setNucleoHeaders(headersAgrupados);
                        setOriginalStudents(JSON.parse(JSON.stringify(parsedStudents)));
                        setStudents(parsedStudents);
                        setCourseName(formattedCourse);
                        setSelectedStudent(parsedStudents[0]);
                        showToast(`Se cargó el curso ${formattedCourse} con ${parsedStudents.length} alumnos de forma exitosa.`, "success");

                    } catch (error) {
                        console.error(error);
                        showToast("Error al decodificar la estructura del Excel. Asegúrate de usar la libreta oficial.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                processExcelFile(file);
            };

            // Configuración Drag & Drop
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.xls') || file.name.endsWith('.xlsx'))) {
                    processExcelFile(file);
                } else {
                    showToast("Por favor, sube un archivo Excel (.xlsx o .xls).", "error");
                }
            };

            const filteredStudents = students.filter(student =>
                student.nombre.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // Generador de un PDF único en formato APAISADO (Landscape) optimizado en tamaño e institucional bordó
            const generateStudentPDFDocument = (student) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                
                // Fondo corporativo sutil
                doc.setFillColor(253, 251, 251);
                doc.rect(0, 0, 297, 210, 'F');

                // Cabecera superior institucional (Bordó)
                doc.setFillColor(128, 0, 32); 
                doc.rect(12, 12, 273, 5, 'F');

                // Incrustar Logo si existe
                if (logo) {
                    try {
                        doc.addImage(logo, 'JPEG', 12, 21, 24, 16); 
                    } catch (err) {
                        console.error("No se pudo añadir el logo al PDF", err);
                    }
                }

                // Títulos oficiales - Bordó
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(18);
                doc.setTextColor(128, 0, 32);
                doc.text(courseName || "LIBRETA DE CALIFICACIONES", logo ? 40 : 12, 27);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(100, 116, 139);
                doc.text("INFORME DE RENDIMIENTO ACADÉMICO - COLEGIO SAN JOSÉ", logo ? 40 : 12, 33);

                // Tarjeta informativa del alumno
                doc.setFillColor(255, 255, 255);
                doc.setDrawColor(241, 218, 221);
                doc.roundedRect(12, 40, 273, 16, 2, 2, 'FD');

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(7.5);
                doc.setTextColor(128, 0, 32);
                doc.text("ESTUDIANTE", 16, 45);
                doc.setTextColor(30, 41, 59);
                doc.setFontSize(10);
                doc.text(student.nombre.toUpperCase(), 16, 51);

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(7.5);
                doc.setTextColor(128, 0, 32);
                doc.text("CURSO / DIVISIÓN", 200, 45);
                doc.setTextColor(30, 41, 59);
                doc.setFontSize(10);
                doc.text(courseName || "GENERAL", 200, 51);

                // Construcción de la grilla de doble cabecera para AutoTable
                const row1_Header = ['Asignatura y Docente'];
                nucleoHeaders.forEach(nh => {
                    row1_Header.push({ content: nh.name, colSpan: nh.colspan, halign: 'center' });
                });

                const row2_Header = [''];
                globalColumns.forEach(col => {
                    row2_Header.push(col.subheader);
                });

                // Armar filas de calificaciones exactas del estudiante
                const tableBody = Object.entries(student.materias).map(([materiaName, dataObj]) => {
                    const rowCells = [`${materiaName}\nDoc: ${dataObj.docente}`];
                    globalColumns.forEach(col => {
                        const val = dataObj.calificaciones[col.key];
                        rowCells.push(val !== undefined ? val : "");
                    });
                    return rowCells;
                });

                // AutoTable apaisado de precisión con tamaño de letra extra fino y angosto
                doc.autoTable({
                    startY: 61,
                    margin: { left: 12, right: 12, bottom: 20 },
                    head: [row1_Header, row2_Header],
                    body: tableBody,
                    theme: 'grid',
                    headStyles: {
                        fillColor: [128, 0, 32], // Color bordó
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                        fontSize: 6.5, // Más pequeña
                        halign: 'center',
                        valign: 'middle',
                        cellPadding: 1.2
                    },
                    styles: {
                        fontSize: 6.0, // Más angosto para ajuste óptimo
                        cellPadding: 1, // Reducción de espacio
                        lineColor: [226, 232, 240],
                        halign: 'center' // Centrar por defecto todas las calificaciones
                    },
                    columnStyles: {
                        0: { cellWidth: 38, halign: 'left', fontStyle: 'bold' } // Columna de materias más estrecha
                    },
                    didParseCell: function (data) {
                        if (data.row.section === 'head' && data.column.index === 0) {
                            data.cell.styles.halign = 'left';
                        }
                        
                        // Resaltado de NFN/NFS y notas menores a 7 en el PDF de manera inteligente
                        if (data.row.section === 'body' && data.column.index > 0) {
                            const colIdx = data.column.index - 1;
                            const currentGlobalCol = globalColumns[colIdx];
                            if (currentGlobalCol) {
                                const valStr = data.cell.text[0] ? data.cell.text[0].trim() : "";
                                const isNFN = currentGlobalCol.subheader.includes("NFN") || currentGlobalCol.subheader.includes("NFS");
                                const belowSeven = isBelowSeven(valStr);

                                // 1. Remarcar columna de Nota Final de Núcleo (NFN) o Nota Final de Semestre (NFS)
                                if (isNFN) {
                                    data.cell.styles.fillColor = [253, 245, 246]; // Fondo bordó muy claro
                                    data.cell.styles.fontStyle = 'bold';
                                    data.cell.styles.textColor = [128, 0, 32]; // Texto color Bordó
                                }

                                // 2. Resaltar en rojo brillante si la calificación es menor a 7
                                if (belowSeven) {
                                    data.cell.styles.textColor = [220, 38, 38]; // Rojo brillante (#DC2626)
                                    data.cell.styles.fontStyle = 'bold';
                                }
                            }
                        }
                    }
                });

                // Dibujar pie de página formal con fecha de emisión en la parte inferior fija
                doc.setFont("Helvetica", "normal");
                doc.setFontSize(7.5);
                doc.setTextColor(148, 163, 184);
                doc.text(`Informe generado el: ${getFormattedDate()}`, 12, 198);
                doc.text("Colegio San José - Documento Académico Oficial", 285, 198, { align: "right" });

                return doc;
            };

            const downloadSinglePDF = (student) => {
                if (!student) return;
                const doc = generateStudentPDFDocument(student);
                doc.save(`Libreta_${student.nombre.replace(/\s+/g, '_')}_${courseName}.pdf`);
                showToast("¡PDF del alumno descargado!", "success");
            };

            // Compilador Masivo: Genera un archivo ZIP con los PDFs de cada estudiante
            const downloadAllPDFsAsZip = async () => {
                if (students.length === 0) return;
                setIsBulkGenerating(true);
                setBulkProgress({ current: 0, total: students.length });

                const zip = new JSZip();

                try {
                    for (let i = 0; i < students.length; i++) {
                        const student = students[i];
                        setBulkProgress({ current: i + 1, total: students.length });

                        const doc = generateStudentPDFDocument(student);
                        const pdfOutput = doc.output('arraybuffer');
                        
                        const cleanName = student.nombre.replace(/[\/\\?%*:|"<>]/g, '_').replace(/\s+/g, '_');
                        zip.file(`Libreta_${cleanName}.pdf`, pdfOutput);

                        await new Promise(resolve => setTimeout(resolve, 60));
                    }

                    const zipContent = await zip.generateAsync({ type: "blob" });
                    
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(zipContent);
                    link.download = `Libretas_${courseName.replace(/\s+/g, '_')}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    showToast(`¡ZIP compilado con éxito! Se procesaron ${students.length} libretas.`, "success");
                } catch (error) {
                    console.error("Error al compilar el archivo ZIP", error);
                    showToast("No se pudo generar el archivo ZIP.", "error");
                } finally {
                    setIsBulkGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Principal */}
                    <header className="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-30 no-print shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                {logo ? (
                                    <div className="relative group">
                                        <img src={logo} alt="Logo escolar" className="h-14 w-auto object-contain rounded border p-0.5 bg-white border-burgundy-light" />
                                        <button 
                                            onClick={removeLogo}
                                            title="Eliminar logo"
                                            className="absolute -top-1.5 -right-1.5 bg-red-700 hover:bg-red-800 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow"
                                        >
                                            <Icon name="trash-2" className="w-3.5 h-3.5" />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="w-12 h-12 rounded-xl bg-burgundy-light border border-burgundy-light flex items-center justify-center text-burgundy">
                                        <Icon name="school" className="w-6 h-6" />
                                    </div>
                                )}
                                <div>
                                    <h1 className="text-lg font-bold text-slate-850 tracking-tight flex items-center gap-2 text-burgundy font-serif-elegant">
                                        {courseName ? `Libretas: ${courseName}` : "Colegio San José"}
                                    </h1>
                                    <p className="text-xs text-slate-500">
                                        {courseName ? "Sistema de libretas escolares activo" : "Configura tu institución y arrastra la planilla de alumnos"}
                                    </p>
                                </div>
                            </div>

                            {/* Gestión de Logo */}
                            <div className="flex items-center gap-3 w-full sm:w-auto justify-end">
                                <label className="cursor-pointer inline-flex items-center gap-2 py-2 px-3 text-xs font-semibold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg shadow-sm transition">
                                    <Icon name="image" className="w-4 h-4 text-burgundy" />
                                    <span>{logo ? "Reemplazar Logo" : "Subir Logo de la Escuela"}</span>
                                    <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                                </label>
                                
                                {courseName && (
                                    <label className="cursor-pointer inline-flex items-center gap-2 py-2 px-3 text-xs font-semibold text-white bg-burgundy hover:bg-burgundy-dark rounded-lg shadow transition">
                                        <Icon name="upload-cloud" className="w-4 h-4" />
                                        <span>Subir Otro Curso</span>
                                        <input type="file" accept=".xls,.xlsx" onChange={handleFileChange} className="hidden" />
                                    </label>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Contenido Principal */}
                    <main className="flex-1 max-w-[95%] w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
                        
                        {/* 1. VISTA INICIAL (Sin Archivos Cargados) */}
                        {students.length === 0 ? (
                            <div className="max-w-2xl mx-auto w-full py-8 md:py-16">
                                <div 
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                    className={`p-10 md:p-14 rounded-2xl border-2 border-dashed text-center transition duration-200 bg-white shadow-xl ${
                                        isDragging 
                                            ? "border-burgundy bg-burgundy-light/60 scale-[1.01]" 
                                            : "border-slate-300 hover:border-burgundy"
                                    }`}
                                >
                                    <div className="w-16 h-16 bg-burgundy-light rounded-full flex items-center justify-center mx-auto mb-6 border border-burgundy-light">
                                        <Icon name="file-spreadsheet" className="w-8 h-8 text-burgundy" />
                                    </div>

                                    <h2 className="text-2xl font-serif-elegant font-bold text-slate-800 mb-2">
                                        Cargar Planilla de Calificaciones
                                    </h2>
                                    <p className="text-slate-500 text-sm max-w-md mx-auto mb-8">
                                        Arrastra aquí el archivo oficial de Excel (.xlsx, .xls) de tu curso. El sistema compilará automáticamente las notas de cada pestaña de materias de forma instantánea.
                                    </p>

                                    <label className="cursor-pointer inline-flex items-center gap-2 px-6 py-3.5 bg-burgundy hover:bg-burgundy-dark text-white rounded-xl shadow-lg font-semibold text-sm transition-all transform hover:-translate-y-0.5">
                                        <Icon name="plus-circle" className="w-5 h-5" />
                                        <span>Seleccionar Planilla Excel</span>
                                        <input 
                                            type="file" 
                                            accept=".xls,.xlsx" 
                                            onChange={handleFileChange} 
                                            className="hidden" 
                                        />
                                    </label>
                                </div>
                            </div>
                        ) : (
                            
                            /* 2. VISTA CON ALUMNOS CARGADOS */
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                                
                                {/* Lista de Alumnos Lateral (no-print) */}
                                <aside className="lg:col-span-3 bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm no-print">
                                    <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                                        <div className="relative">
                                            <Icon name="search" className="absolute left-3 top-2.5 h-4 w-4 text-slate-400" />
                                            <input 
                                                type="text" 
                                                placeholder="Filtrar por estudiante..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full pl-9 pr-4 py-2 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus-ring-burgundy transition"
                                            />
                                        </div>
                                    </div>

                                    <div className="max-h-[500px] overflow-y-auto divide-y divide-slate-100 custom-scrollbar">
                                        {filteredStudents.map((student) => (
                                            <button
                                                key={student.nombre}
                                                onClick={() => {
                                                    setSelectedStudent(student);
                                                }}
                                                className={`w-full text-left p-4 flex items-center justify-between transition ${
                                                    selectedStudent && selectedStudent.nombre === student.nombre 
                                                        ? "bg-burgundy-light/60 border-l-4 border-burgundy text-burgundy" 
                                                        : "hover:bg-slate-50"
                                                }`}
                                            >
                                                <div className="min-w-0 pr-3">
                                                    <p className={`text-sm font-semibold truncate ${
                                                        selectedStudent && selectedStudent.nombre === student.nombre ? "text-burgundy" : "text-slate-800"
                                                    }`}>
                                                        {student.nombre}
                                                    </p>
                                                    <p className="text-[11px] text-slate-500 mt-0.5">
                                                        {Object.keys(student.materias).length} Asignaturas cursadas
                                                    </p>
                                                </div>
                                                <Icon name="chevron-right" className={`w-4 h-4 shrink-0 transition ${
                                                    selectedStudent && selectedStudent.nombre === student.nombre ? "text-burgundy" : "text-slate-300"
                                                }`} />
                                            </button>
                                        ))}
                                    </div>

                                    {/* Botón Compilador de ZIP Completo */}
                                    <div className="p-4 bg-slate-50 border-t border-slate-150 flex flex-col gap-2">
                                        <button
                                            onClick={downloadAllPDFsAsZip}
                                            disabled={isBulkGenerating}
                                            className="w-full inline-flex items-center justify-center gap-2 py-2.5 px-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 text-white rounded-lg font-bold text-xs transition shadow-md"
                                        >
                                            {isBulkGenerating ? (
                                                <div className="flex items-center gap-1.5 animate-pulse">
                                                    <span>Generando {bulkProgress.current}/{bulkProgress.total}...</span>
                                                </div>
                                            ) : (
                                                <>
                                                    <Icon name="folder-archive" className="w-4 h-4" />
                                                    <span>Descargar ZIP de todo el Curso</span>
                                                </>
                                            )}
                                        </button>
                                        <div className="text-center text-[10px] text-slate-500">
                                            Genera y empaqueta la libreta apaisada de cada estudiante en un ZIP.
                                        </div>
                                    </div>
                                </aside>

                                {/* Vista de la Libreta */}
                                <div className="lg:col-span-9 flex flex-col gap-4">
                                    
                                    {/* Barra de Acciones del Alumno (no-print) */}
                                    {selectedStudent && (
                                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap items-center justify-between gap-3 shadow-sm no-print">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                                <span className="text-xs font-semibold text-slate-600">Visualizando:</span>
                                                <span className="text-xs font-bold text-burgundy bg-burgundy-light px-2 py-0.5 rounded border border-burgundy-light">
                                                    {selectedStudent.nombre}
                                                </span>
                                            </div>

                                            <div className="flex items-center gap-2">
                                                <button
                                                    onClick={() => downloadSinglePDF(selectedStudent)}
                                                    className="inline-flex items-center gap-1.5 px-3.5 py-2 bg-burgundy hover:bg-burgundy-dark text-white rounded-lg font-semibold text-xs transition shadow-sm"
                                                >
                                                    <Icon name="file-text" className="w-3.5 h-3.5" />
                                                    <span>Descargar PDF Apaisado</span>
                                                </button>

                                                <button
                                                    onClick={() => window.print()}
                                                    className="inline-flex items-center gap-1.5 px-3.5 py-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 rounded-lg font-semibold text-xs transition"
                                                >
                                                    <Icon name="printer" className="w-3.5 h-3.5" />
                                                    <span>Imprimir</span>
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* DISEÑO VISUAL DE LA LIBRETA (Formato de Grilla Completo Apaisado) */}
                                    {selectedStudent ? (
                                        <div className="bg-white rounded-xl border border-slate-300 p-6 shadow-md print-card relative max-w-full overflow-hidden">
                                            <div>
                                                {/* Encabezado Escolar */}
                                                <div className="flex flex-row justify-between items-start border-b-2 border-burgundy pb-4 mb-5 gap-4">
                                                    <div className="flex-1">
                                                        <h2 className="text-xs font-bold tracking-widest text-burgundy uppercase mb-1">
                                                            Informe de Calificaciones
                                                        </h2>
                                                        <h1 className="text-2xl font-serif-elegant font-bold text-slate-800 tracking-tight leading-none uppercase">
                                                            {courseName}
                                                        </h1>
                                                        <p className="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">
                                                            Ciclo Lectivo en Curso - Colegio San José
                                                        </p>
                                                    </div>

                                                    {/* Logo escolar */}
                                                    {logo && (
                                                        <img 
                                                            src={logo} 
                                                            alt="Logo Escuela" 
                                                            className="h-14 w-auto object-contain shrink-0 max-w-[150px]"
                                                        />
                                                    )}
                                                </div>

                                                {/* Información del Estudiante */}
                                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 mb-5 grid grid-cols-2 gap-3 text-xs">
                                                    <div>
                                                        <span className="text-burgundy uppercase text-[9px] font-bold block mb-0.5">Estudiante</span>
                                                        <span className="font-bold text-slate-800 text-sm uppercase">{selectedStudent.nombre}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-burgundy uppercase text-[9px] font-bold block mb-0.5">Curso / División</span>
                                                        <span className="font-bold text-slate-800 text-sm">{courseName}</span>
                                                    </div>
                                                </div>

                                                {/* Contenedor de la tabla con Scrollbar de Precisión integrado */}
                                                <div className="overflow-x-auto border border-slate-300 rounded-lg max-w-full my-2 custom-scrollbar">
                                                    <table className="w-full text-left border-collapse text-[10px] min-w-[850px] table-fixed">
                                                        <thead>
                                                            {/* Fila 1: Núcleos agrupados con letras y anchos reducidos */}
                                                            <tr className="bg-burgundy text-white border-b border-slate-300">
                                                                <th className="py-1 px-2 font-bold uppercase tracking-wider border-r border-slate-700 text-left w-48 text-[8px]">Asignatura y Docente</th>
                                                                {nucleoHeaders.map((nh, idx) => (
                                                                    <th 
                                                                        key={idx} 
                                                                        colSpan={nh.colspan} 
                                                                        className="py-1 px-1 font-bold uppercase tracking-wider text-center border-r border-slate-700 last:border-r-0 text-[8px]"
                                                                    >
                                                                        {nh.name}
                                                                    </th>
                                                                ))}
                                                            </tr>
                                                            {/* Fila 2: Subheaders individuales con letra super compacta */}
                                                            <tr className="bg-slate-100 text-slate-700 border-b border-slate-300">
                                                                <th className="py-1 px-2 border-r border-slate-300 w-48 text-left"></th>
                                                                {globalColumns.map((col, idx) => (
                                                                    <th 
                                                                        key={idx} 
                                                                        className="py-1 px-0.5 font-bold text-center border-r border-slate-200 last:border-r-0 text-[7px] w-8 min-w-[28px] max-w-[34px] truncate"
                                                                        title={col.subheader}
                                                                    >
                                                                        {col.subheader}
                                                                    </th>
                                                                ))}
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-200">
                                                            {Object.entries(selectedStudent.materias).map(([materiaName, dataObj]) => (
                                                                <tr key={materiaName} className="hover:bg-slate-50/50">
                                                                    <td className="py-1.5 px-2 border-r border-slate-200 w-48 shrink-0">
                                                                        <div className="font-bold text-slate-800 text-[10px] truncate">{materiaName}</div>
                                                                        <div className="text-[8px] text-slate-400 truncate">Doc: {dataObj.docente}</div>
                                                                    </td>
                                                                    {globalColumns.map((col, idx) => {
                                                                        const val = dataObj.calificaciones[col.key];
                                                                        const isNFN = col.subheader.includes("NFN") || col.subheader.includes("NFS");
                                                                        const belowSeven = isBelowSeven(val);
                                                                        
                                                                        // Definir clases dinámicas según la columna y el valor
                                                                        let cellClass = "py-1.5 px-0.5 text-center border-r border-slate-150 last:border-r-0 text-[8px] w-8 min-w-[28px] max-w-[34px] ";
                                                                        
                                                                        if (isNFN) {
                                                                            cellClass += "bg-burgundy-light font-black text-burgundy text-[9px] border-x border-burgundy-light ";
                                                                        } else {
                                                                            cellClass += "text-slate-800 font-semibold ";
                                                                        }

                                                                        if (belowSeven) {
                                                                            cellClass += "text-red-600 font-bold ";
                                                                        }

                                                                        return (
                                                                            <td key={idx} className={cellClass}>
                                                                                {val !== undefined ? val : "-"}
                                                                            </td>
                                                                        );
                                                                    })}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                {/* Fecha de Emisión del Informe abajo a la derecha */}
                                                <div className="mt-6 pt-3 border-t border-slate-200 flex justify-between items-center text-[9px] text-slate-400 font-semibold uppercase tracking-wider">
                                                    <span>Colegio San José - Informe Académico</span>
                                                    <span>Fecha de Emisión: {getFormattedDate()}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-12 text-center text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            Selecciona un alumno para previsualizar.
                                        </div>
                                    )}
                                </div>

                            </div>
                        )}
                    </main>

                    {/* Pie de página */}
                    <footer className="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-400 no-print mt-auto">
                        <p>© 2026 Colegio San José - Todos los derechos reservados.</p>
                    </footer>

                    {/* Notificación (Toast) */}
                    {toast && (
                        <div className="fixed bottom-4 right-4 z-50 no-print">
                            <div className={`px-4 py-2.5 rounded-lg shadow-xl text-white font-semibold text-xs flex items-center gap-2 ${
                                toast.type === "success" ? "bg-emerald-600" : toast.type === "error" ? "bg-red-600" : "bg-burgundy"
                            }`}>
                                <Icon name={toast.type === "success" ? "check-circle" : "alert-circle"} className="w-4 h-4" />
                                <span>{toast.message}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
