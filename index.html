<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Libretas de Calificaciones - Colegio San José</title>
    <!-- Tailwind CSS para diseño responsive y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&family=Playfair+Display:ital,wght=0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- React y ReactDOM UMD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone para compilar JSX en vivo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.17/babel.min.js"></script>
    
    <!-- jsPDF & AutoTable de máxima calidad -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <!-- SheetJS para la lectura perfecta de archivos .xlsx -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- JSZip para compilar descargas masivas en ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif-elegant {
            font-family: 'Playfair Display', serif;
        }
        /* Color institucional bordó oficial */
        .bg-burgundy {
            background-color: #800020 !important;
        }
        .hover\:bg-burgundy-dark:hover {
            background-color: #600018 !important;
        }
        .text-burgundy {
            color: #800020 !important;
        }
        .border-burgundy {
            border-color: #800020 !important;
        }
        .bg-burgundy-light {
            background-color: #fdf5f6 !important;
        }
        .border-burgundy-light {
            border-color: #fbc6cd !important;
        }
        .focus-ring-burgundy:focus {
            --tw-ring-color: #800020 !important;
            border-color: #800020 !important;
        }

        /* Scrollbar fluido para las tablas de calificaciones */
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #800020;
        }

        /* Configuración estricta de impresión en 2 hojas horizontales */
        @media print {
            body {
                background-color: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            .print-card {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0.2cm 0 !important;
                width: 100% !important;
                display: block !important;
            }
            .print-page-break {
                page-break-before: always !important;
                break-before: page !important;
                margin-top: 0 !important;
                padding-top: 0.8cm !important;
            }
            .print-container {
                display: block !important;
                width: 297mm !important; /* Forzar ancho horizontal de hoja A4 */
                margin: 0 auto !important;
            }
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Icon({ name, className = "w-4 h-4" }) {
            const attrs = {
                className,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: "2",
                strokeLinecap: "round",
                strokeLinejoin: "round"
            };

            switch (name) {
                case "school":
                    return (
                        <svg {...attrs}>
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    );
                case "image":
                    return (
                        <svg {...attrs}>
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    );
                case "upload-cloud":
                    return (
                        <svg {...attrs}>
                            <polyline points="16 16 12 12 8 16" />
                            <line x1="12" y1="12" x2="12" y2="21" />
                            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                        </svg>
                    );
                case "search":
                    return (
                        <svg {...attrs}>
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    );
                case "chevron-right":
                    return (
                        <svg {...attrs}>
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    );
                case "folder-archive":
                    return (
                        <svg {...attrs}>
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                            <circle cx="10" cy="14" r="2" />
                            <line x1="12" y1="14" x2="15" y2="14" />
                        </svg>
                    );
                case "file-text":
                    return (
                        <svg {...attrs}>
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                        </svg>
                    );
                case "printer":
                    return (
                        <svg {...attrs}>
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                            <rect x="6" y="14" width="12" height="8" />
                        </svg>
                    );
                case "trash-2":
                    return (
                        <svg {...attrs}>
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    );
                case "check-circle":
                    return (
                        <svg {...attrs}>
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg>
                    );
                case "alert-circle":
                    return (
                        <svg {...attrs}>
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                    );
                case "file-spreadsheet":
                    return (
                        <svg {...attrs}>
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <rect x="8" y="13" width="3" height="3" />
                            <rect x="13" y="13" width="3" height="3" />
                        </svg>
                    );
                default:
                    return null;
            }
        }

        function App() {
            const [courses, setCourses] = useState({}); // Clave: NombreCurso -> Estudiantes
            const [selectedCourseName, setSelectedCourseName] = useState("");
            const [students, setStudents] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const [logo, setLogo] = useState(localStorage.getItem('school_logo') || "");
            const [searchQuery, setSearchQuery] = useState("");
            const [toast, setToast] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            
            const [isBulkGenerating, setIsBulkGenerating] = useState(false);
            const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });

            useEffect(() => {
                if (selectedCourseName) {
                    document.title = `Libretas - ${selectedCourseName}`;
                } else {
                    document.title = "Generador de Libretas de Calificaciones - Colegio San José";
                }
            }, [selectedCourseName]);

            const showToast = (message, type = "success") => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4500);
            };

            const getFormattedDate = () => {
                const today = new Date();
                const day = String(today.getDate()).padStart(2, '0');
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const year = today.getFullYear();
                return `${day}/${month}/${year}`;
            };

            const isBelowSeven = (val) => {
                if (val === undefined || val === null || val === "") return false;
                const normalized = val.toString().replace(',', '.').trim();
                const num = parseFloat(normalized);
                return !isNaN(num) && num < 7;
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 150;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.60);
                        setLogo(compressedBase64);
                        localStorage.setItem('school_logo', compressedBase64);
                        showToast("Logo institucional configurado correctamente.", "success");
                    };
                };
                reader.readAsDataURL(file);
            };

            const removeLogo = () => {
                setLogo("");
                localStorage.removeItem('school_logo');
                showToast("Logo institucional removido.", "info");
            };

            const processExcelFile = (file) => {
                if (!file) return;

                const fileNameWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                const formattedCourse = fileNameWithoutExt.replace(/_/g, " ").replace(/-/g, " ").toUpperCase();

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = e.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        
                        const studentMap = new Map();

                        workbook.SheetNames.forEach(sheetName => {
                            const nameLower = sheetName.toLowerCase();
                            if (nameLower.includes("sintesis") || nameLower.includes("síntesis") || nameLower.includes("resumen")) {
                                return;
                            }

                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                            if (rows.length < 3) return;

                            let materiaName = sheetName.trim();
                            let docenteName = "Docente s/d";

                            for (let r = 0; r < Math.min(10, rows.length); r++) {
                                const row = rows[r];
                                if (!row) continue;
                                for (let c = 0; c < row.length; c++) {
                                    const val = row[c];
                                    if (val && typeof val === 'string') {
                                        if (val.toUpperCase().includes("MATERIA:")) {
                                            materiaName = row[c + 1] || row[c + 2] || val.split(":")[1]?.trim() || sheetName;
                                            materiaName = materiaName.toString().trim();
                                        }
                                        if (val.toUpperCase().includes("DOCENTE:")) {
                                            docenteName = row[c + 1] || row[c + 2] || val.split(":")[1]?.trim() || "Docente s/d";
                                            docenteName = docenteName.toString().trim();
                                        }
                                    }
                                }
                            }

                            let studentHeaderRowIdx = -1;
                            let studentNameColIdx = -1;

                            for (let r = 0; r < Math.min(15, rows.length); r++) {
                                const row = rows[r];
                                if (!row) continue;
                                const colIdx = row.findIndex(cell => {
                                    if (!cell) return false;
                                    const txt = cell.toString().toUpperCase();
                                    return txt.includes("ESTUDIANTE") || txt.includes("ALUMNO") || txt.includes("NOMBRE");
                                });
                                if (colIdx !== -1) {
                                    studentHeaderRowIdx = r;
                                    studentNameColIdx = colIdx;
                                    break;
                                }
                            }

                            if (studentHeaderRowIdx === -1 || studentNameColIdx === -1) {
                                return;
                            }

                            for (let r = studentHeaderRowIdx + 2; r < rows.length; r++) {
                                const row = rows[r];
                                if (!row || !row[studentNameColIdx]) continue;

                                const rawName = row[studentNameColIdx].toString().trim();
                                if (rawName.toUpperCase().includes("ESTUDIANTE") || rawName.toUpperCase().includes("PROMEDIO") || rawName.toUpperCase().includes("DOCENTE") || rawName === "") {
                                    continue;
                                }

                                const normName = rawName.toUpperCase();
                                if (!studentMap.has(normName)) {
                                    studentMap.set(normName, {
                                        nombre: rawName,
                                        materias: {}
                                    });
                                }

                                const studentObj = studentMap.get(normName);
                                if (!studentObj.materias[materiaName]) {
                                    studentObj.materias[materiaName] = {
                                        docente: docenteName,
                                        calificaciones: {}
                                    };
                                }

                                let currentDataColIdx = studentNameColIdx + 1;
                                for (let n = 1; n <= 8; n++) {
                                    const subheaders = ["N1", "N2", "N3", "R1", "R2", `NFN${n}`];
                                    subheaders.forEach((sub) => {
                                        const cellVal = row[currentDataColIdx];
                                        const finalVal = (cellVal !== undefined && cellVal !== null) ? cellVal.toString().trim() : "";
                                        studentObj.materias[materiaName].calificaciones[`NUC${n}_${sub}`] = finalVal;
                                        currentDataColIdx++;
                                    });
                                }
                            }
                        });

                        const parsedStudents = Array.from(studentMap.values());
                        if (parsedStudents.length === 0) {
                            showToast("No se encontraron registros válidos de estudiantes en el Excel.", "error");
                            return;
                        }

                        parsedStudents.sort((a, b) => a.nombre.localeCompare(b.nombre));

                        setCourses(prev => {
                            const updated = { ...prev, [formattedCourse]: parsedStudents };
                            return updated;
                        });

                        setSelectedCourseName(formattedCourse);
                        setStudents(parsedStudents);
                        setSelectedStudent(parsedStudents[0]);
                        showToast(`¡Curso ${formattedCourse} cargado correctamente! (${parsedStudents.length} estudiantes)`, "success");

                    } catch (error) {
                        console.error(error);
                        showToast("Error procesando la planilla. Verifique el formato e inténtelo de nuevo.", "error");
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                processExcelFile(file);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.xls') || file.name.endsWith('.xlsx'))) {
                    processExcelFile(file);
                } else {
                    showToast("Sube únicamente archivos Excel (.xls o .xlsx).", "error");
                }
            };

            const handleCourseSwitch = (courseName) => {
                if (courses[courseName]) {
                    setSelectedCourseName(courseName);
                    setStudents(courses[courseName]);
                    setSelectedStudent(courses[courseName][0]);
                    showToast(`Visualizando el curso: ${courseName}`, "info");
                }
            };

            const filteredStudents = students.filter(student =>
                student.nombre.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const generateStudentPDF = (student, cName) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4'); // Paisaje A4 (297x210mm)

                // Encabezado Ultra Angosto y Optimizado (Gana 20mm de espacio vertical libre para evitar saltos de renglón)
                const drawTemplate = (pageNum, studentName, currentCourse) => {
                    // Fondo premium institucional de fondo de página
                    doc.setFillColor(253, 251, 251);
                    doc.rect(0, 0, 297, 210, 'F');

                    // Barra superior borgoña sumamente compacta (Y: 8 a 11 mm)
                    doc.setFillColor(128, 0, 32); 
                    doc.rect(12, 8, 273, 3, 'F');

                    // Renderizado del Logo si está cargado por el usuario (Y: 13 a 23 mm)
                    let textOffset = 12;
                    if (logo) {
                        try {
                            doc.addImage(logo, 'JPEG', 12, 13, 18, 10); 
                            textOffset = 33;
                        } catch (err) {
                            console.error("Error al renderizar el logo en el PDF", err);
                        }
                    }

                    // Títulos institucionales en una única línea combinada reducida
                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(11);
                    doc.setTextColor(128, 0, 32);
                    doc.text("COLEGIO SAN JOSÉ", textOffset, 18);

                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(7.5);
                    doc.setTextColor(100, 116, 139);
                    doc.text("INFORME DE CALIFICACIONES OFICIAL", textOffset, 22);

                    // Fila única consolidada para datos del estudiante (Y: 26 a 34 mm)
                    doc.setFillColor(248, 250, 252);
                    doc.setDrawColor(226, 232, 240);
                    doc.roundedRect(12, 26, 273, 8, 1, 1, 'FD');

                    // Contenido de la Ficha en una sola línea horizontal
                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(6.5);
                    doc.setTextColor(128, 0, 32);
                    doc.text("ESTUDIANTE:", 16, 31.5);
                    doc.setTextColor(30, 41, 59);
                    doc.setFontSize(8.5);
                    doc.text(studentName.toUpperCase(), 36, 31.5);

                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(6.5);
                    doc.setTextColor(128, 0, 32);
                    doc.text("CURSO / DIVISIÓN:", 165, 31.5);
                    doc.setTextColor(30, 41, 59);
                    doc.setFontSize(8);
                    doc.text(currentCourse || "GENERAL", 192, 31.5);

                    doc.setFont("Helvetica", "bold");
                    doc.setFontSize(6.5);
                    doc.setTextColor(128, 0, 32);
                    doc.text("EMISIÓN:", 242, 31.5);
                    doc.setTextColor(30, 41, 59);
                    doc.setFontSize(8);
                    doc.text(getFormattedDate(), 256, 31.5);
                };

                const writeFooter = (pageNum) => {
                    doc.setFont("Helvetica", "normal");
                    doc.setFontSize(8);
                    doc.setTextColor(148, 163, 184);
                    doc.text(`Informe académico oficial de calificaciones  |  Colegio San José`, 12, 198);
                    doc.text(`Página ${pageNum} de 2  |  Emitido el: ${getFormattedDate()}`, 285, 198, { align: "right" });
                };

                // ---- HOJA 1: Núcleos 1 a 4 ----
                drawTemplate(1, student.nombre, cName);

                const page1HeadersGrouped = [{ content: 'Asignatura / Docente', rowSpan: 2, valign: 'middle', halign: 'left' }];
                for (let n = 1; n <= 4; n++) {
                    page1HeadersGrouped.push({ content: `NÚCLEO ${n}`, colSpan: 6, halign: 'center' });
                }

                const page1Subheaders = [];
                for (let n = 1; n <= 4; n++) {
                    ["N1", "N2", "N3", "R1", "R2", `NFN${n}`].forEach(sub => {
                        page1Subheaders.push({ content: sub, halign: 'center' });
                    });
                }

                const page1Body = Object.entries(student.materias).map(([materiaName, dataObj]) => {
                    const rowCells = [`${materiaName}\nDoc: ${dataObj.docente}`];
                    for (let n = 1; n <= 4; n++) {
                        ["N1", "N2", "N3", "R1", "R2", `NFN${n}`].forEach(sub => {
                            rowCells.push(dataObj.calificaciones[`NUC${n}_${sub}`] || "");
                        });
                    }
                    return rowCells;
                });

                // Comenzando exactamente a los 38mm para maximizar el área de impresión útil
                doc.autoTable({
                    startY: 38,
                    margin: { left: 12, right: 12, bottom: 15 },
                    head: [page1HeadersGrouped, page1Subheaders],
                    body: page1Body,
                    theme: 'grid',
                    headStyles: {
                        fillColor: [128, 0, 32],
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                        fontSize: 8,
                        halign: 'center',
                        valign: 'middle',
                        cellPadding: 1.5
                    },
                    styles: {
                        fontSize: 8,
                        cellPadding: 1.5,
                        lineColor: [203, 213, 225],
                        halign: 'center'
                    },
                    columnStyles: {
                        0: { cellWidth: 48, halign: 'left', fontStyle: 'bold', fontSize: 8 }
                    },
                    didParseCell: function (data) {
                        if (data.row.section === 'body' && data.column.index > 0) {
                            const relativeColIdx = data.column.index - 1;
                            const subIdx = relativeColIdx % 6; 
                            const isNFN = (subIdx === 5);

                            const valStr = data.cell.text[0] ? data.cell.text[0].trim() : "";
                            const belowSeven = isBelowSeven(valStr);

                            if (isNFN) {
                                data.cell.styles.fillColor = [241, 245, 249];
                                data.cell.styles.fontStyle = 'bold';
                                data.cell.styles.fontSize = 9.5;
                                if (belowSeven) {
                                    data.cell.styles.textColor = [220, 38, 38];
                                } else {
                                    data.cell.styles.textColor = [29, 78, 216];
                                }
                            } else if (belowSeven) {
                                data.cell.styles.fillColor = [254, 226, 226];
                                data.cell.styles.textColor = [220, 38, 38];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                    }
                });

                writeFooter(1);

                // ---- HOJA 2: Núcleos 5 a 8 ----
                doc.addPage('l', 'mm', 'a4');
                drawTemplate(2, student.nombre, cName);

                const page2HeadersGrouped = [{ content: 'Asignatura / Docente', rowSpan: 2, valign: 'middle', halign: 'left' }];
                for (let n = 5; n <= 8; n++) {
                    page2HeadersGrouped.push({ content: `NÚCLEO ${n}`, colSpan: 6, halign: 'center' });
                }

                const page2Subheaders = [];
                for (let n = 5; n <= 8; n++) {
                    ["N1", "N2", "N3", "R1", "R2", `NFN${n}`].forEach(sub => {
                        page2Subheaders.push({ content: sub, halign: 'center' });
                    });
                }

                const page2Body = Object.entries(student.materias).map(([materiaName, dataObj]) => {
                    const rowCells = [`${materiaName}\nDoc: ${dataObj.docente}`];
                    for (let n = 5; n <= 8; n++) {
                        ["N1", "N2", "N3", "R1", "R2", `NFN${n}`].forEach(sub => {
                            rowCells.push(dataObj.calificaciones[`NUC${n}_${sub}`] || "");
                        });
                    }
                    return rowCells;
                });

                // Comenzando exactamente a los 38mm para maximizar el área de la segunda página
                doc.autoTable({
                    startY: 38,
                    margin: { left: 12, right: 12, bottom: 15 },
                    head: [page2HeadersGrouped, page2Subheaders],
                    body: page2Body,
                    theme: 'grid',
                    headStyles: {
                        fillColor: [128, 0, 32],
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                        fontSize: 8,
                        halign: 'center',
                        valign: 'middle',
                        cellPadding: 1.5
                    },
                    styles: {
                        fontSize: 8,
                        cellPadding: 1.5,
                        lineColor: [203, 213, 225],
                        halign: 'center'
                    },
                    columnStyles: {
                        0: { cellWidth: 48, halign: 'left', fontStyle: 'bold', fontSize: 8 }
                    },
                    didParseCell: function (data) {
                        if (data.row.section === 'body' && data.column.index > 0) {
                            const relativeColIdx = data.column.index - 1;
                            const subIdx = relativeColIdx % 6; 
                            const isNFN = (subIdx === 5);

                            const valStr = data.cell.text[0] ? data.cell.text[0].trim() : "";
                            const belowSeven = isBelowSeven(valStr);

                            if (isNFN) {
                                data.cell.styles.fillColor = [241, 245, 249];
                                data.cell.styles.fontStyle = 'bold';
                                data.cell.styles.fontSize = 9.5;
                                if (belowSeven) {
                                    data.cell.styles.textColor = [220, 38, 38];
                                } else {
                                    data.cell.styles.textColor = [29, 78, 216];
                                }
                            } else if (belowSeven) {
                                data.cell.styles.fillColor = [254, 226, 226];
                                data.cell.styles.textColor = [220, 38, 38];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                    }
                });

                writeFooter(2);

                return doc;
            };

            const downloadSinglePDF = (student) => {
                if (!student) return;
                const doc = generateStudentPDF(student, selectedCourseName);
                doc.save(`Libreta_${student.nombre.replace(/\s+/g, '_')}_${selectedCourseName}.pdf`);
                showToast("¡Archivo PDF oficial de 2 páginas descargado!", "success");
            };

            const downloadAllPDFsAsZip = async () => {
                if (students.length === 0) return;
                setIsBulkGenerating(true);
                setBulkProgress({ current: 0, total: students.length });

                const zip = new JSZip();

                try {
                    for (let i = 0; i < students.length; i++) {
                        const student = students[i];
                        setBulkProgress({ current: i + 1, total: students.length });

                        const doc = generateStudentPDF(student, selectedCourseName);
                        const pdfOutput = doc.output('arraybuffer');
                        
                        const cleanName = student.nombre.replace(/[\/\\?%*:|"<>]/g, '_').replace(/\s+/g, '_');
                        zip.file(`Libreta_${cleanName}.pdf`, pdfOutput);

                        await new Promise(resolve => setTimeout(resolve, 60));
                    }

                    const zipContent = await zip.generateAsync({ type: "blob" });
                    
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(zipContent);
                    link.download = `Libretas_Colegio_San_Jose_${selectedCourseName.replace(/\s+/g, '_')}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    showToast(`¡ZIP de calificaciones procesado! ${students.length} libretas exportadas.`, "success");
                } catch (error) {
                    console.error("Error al compilar el archivo ZIP", error);
                    showToast("Error inesperado en la compilación del archivo ZIP masivo.", "error");
                } finally {
                    setIsBulkGenerating(false);
                }
            };

            const renderTableSection = (student, startN, endN) => {
                return (
                    <div className="overflow-x-auto border border-slate-300 rounded-lg max-w-full my-2 custom-scrollbar shadow-md">
                        <table className="w-full text-left border-collapse min-w-[750px] table-fixed">
                            <thead>
                                <tr className="bg-burgundy text-white border-b border-slate-350">
                                    <th className="py-2.5 px-3 font-bold uppercase border-r border-slate-700 text-left w-56 text-[10px]">Asignatura / Docente</th>
                                    {Array.from({ length: endN - startN + 1 }).map((_, i) => {
                                        const n = startN + i;
                                        return (
                                            <th 
                                                key={n} 
                                                colSpan={6} 
                                                className="py-1.5 px-1 font-extrabold uppercase text-center border-r border-slate-700 last:border-r-0 text-[11px] bg-slate-900/10"
                                            >
                                                NÚCLEO {n}
                                            </th>
                                        );
                                    })}
                                </tr>
                                <tr className="bg-slate-100 text-slate-700 border-b border-slate-300">
                                    <th className="py-2 px-3 border-r border-slate-300 w-56 text-left"></th>
                                    {Array.from({ length: endN - startN + 1 }).map((_, i) => {
                                        const n = startN + i;
                                        const subheaders = ["N1", "N2", "N3", "R1", "R2", `NFN${n}`];
                                        return subheaders.map((sub, sIdx) => {
                                            const isNFN = sIdx === 5;
                                            return (
                                                <th 
                                                    key={`${n}_${sub}`} 
                                                    className={`py-1 px-0.5 font-bold text-center border-r border-slate-200 last:border-r-0 text-[10px] w-12 min-w-[36px] max-w-[42px] truncate ${
                                                        isNFN ? 'bg-slate-200 text-blue-700 font-black text-[11px]' : ''
                                                    }`}
                                                >
                                                    {sub}
                                                </th>
                                            );
                                        });
                                    })}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                {Object.entries(student.materias).map(([materiaName, dataObj]) => (
                                    <tr key={materiaName} className="hover:bg-slate-50/50 transition-colors">
                                        <td className="py-2 px-3 border-r border-slate-200 w-56 shrink-0">
                                            <div className="font-bold text-slate-800 text-xs truncate leading-normal">{materiaName}</div>
                                            <div className="text-[10px] text-slate-500 truncate leading-normal">Doc: {dataObj.docente}</div>
                                        </td>
                                        {Array.from({ length: endN - startN + 1 }).map((_, i) => {
                                            const n = startN + i;
                                            const subheaders = ["N1", "N2", "N3", "R1", "R2", `NFN${n}`];
                                            return subheaders.map((sub, sIdx) => {
                                                const val = dataObj.calificaciones[`NUC${n}_${sub}`];
                                                const isNFN = (sIdx === 5);
                                                const belowSeven = isBelowSeven(val);
                                                
                                                let cellClass = "py-2 px-0.5 text-center border-r border-slate-150 last:border-r-0 w-12 min-w-[36px] max-w-[42px] ";
                                                
                                                if (isNFN) {
                                                    cellClass += "bg-slate-100 font-black text-[14px] border-x border-slate-200 ";
                                                    if (belowSeven) {
                                                        cellClass += "text-red-600 ";
                                                    } else {
                                                        cellClass += "text-blue-700 ";
                                                    }
                                                } else {
                                                    if (belowSeven) {
                                                        cellClass += "bg-red-50 text-red-600 font-bold text-[11.5px] ";
                                                    } else {
                                                        cellClass += "text-slate-700 font-semibold text-[11px] ";
                                                    }
                                                }

                                                return (
                                                    <td key={`${n}_${sub}`} className={cellClass}>
                                                        {val !== undefined && val !== "" ? val : "-"}
                                                    </td>
                                                );
                                            });
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Principal de la Web */}
                    <header className="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-30 no-print shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                {logo ? (
                                    <div className="relative group">
                                        <img src={logo} alt="Logo escolar" className="h-14 w-auto object-contain rounded border p-0.5 bg-white border-burgundy-light" />
                                        <button 
                                            onClick={removeLogo}
                                            title="Eliminar logo"
                                            className="absolute -top-1.5 -right-1.5 bg-red-700 hover:bg-red-800 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow"
                                        >
                                            <Icon name="trash-2" className="w-3.5 h-3.5" />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="w-12 h-12 rounded-xl bg-burgundy-light border border-burgundy-light flex items-center justify-center text-burgundy">
                                        <Icon name="school" className="w-6 h-6" />
                                    </div>
                                )}
                                <div>
                                    <h1 className="text-lg font-bold text-slate-850 tracking-tight flex items-center gap-2 text-burgundy font-serif-elegant">
                                        Colegio San José
                                    </h1>
                                    <p className="text-xs text-slate-500">
                                        Generador inteligente de Libretas de Calificaciones
                                    </p>
                                </div>
                            </div>

                            {/* Gestión de Cargas de Logo y Planillas */}
                            <div className="flex items-center gap-3 w-full sm:w-auto justify-end">
                                {Object.keys(courses).length > 0 && (
                                    <div className="flex items-center gap-1.5">
                                        <span className="text-[11px] font-semibold text-slate-500">Curso Activo:</span>
                                        <select 
                                            value={selectedCourseName}
                                            onChange={(e) => handleCourseSwitch(e.target.value)}
                                            className="py-1.5 px-3 bg-slate-100 border border-slate-200 rounded-lg text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-burgundy cursor-pointer"
                                        >
                                            {Object.keys(courses).map(c => (
                                                <option key={c} value={c}>{c}</option>
                                            ))}
                                        </select>
                                    </div>
                                )}

                                <label className="cursor-pointer inline-flex items-center gap-2 py-2 px-3 text-xs font-semibold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg shadow-sm transition">
                                    <Icon name="image" className="w-4 h-4 text-burgundy" />
                                    <span>{logo ? "Reemplazar Logo" : "Subir Logo"}</span>
                                    <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                                </label>
                                
                                <label className="cursor-pointer inline-flex items-center gap-2 py-2 px-3 text-xs font-semibold text-white bg-burgundy hover:bg-burgundy-dark rounded-lg shadow transition">
                                    <Icon name="upload-cloud" className="w-4 h-4" />
                                    <span>Cargar Curso (Excel)</span>
                                    <input type="file" accept=".xls,.xlsx" onChange={handleFileChange} className="hidden" />
                                </label>
                            </div>
                        </div>
                    </header>

                    {/* Contenido Principal con Drag and Drop */}
                    <main className="flex-1 max-w-[97%] w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
                        
                        {students.length === 0 ? (
                            <div className="max-w-2xl mx-auto w-full py-8 md:py-16">
                                <div 
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                    className={`p-10 md:p-14 rounded-2xl border-2 border-dashed text-center transition duration-200 bg-white shadow-xl ${
                                        isDragging 
                                            ? "border-burgundy bg-burgundy-light/60 scale-[1.01]" 
                                            : "border-slate-300 hover:border-burgundy"
                                    }`}
                                >
                                    <div className="w-16 h-16 bg-burgundy-light rounded-full flex items-center justify-center mx-auto mb-6 border border-burgundy-light">
                                        <Icon name="file-spreadsheet" className="w-8 h-8 text-burgundy" />
                                    </div>

                                    <h2 className="text-2xl font-serif-elegant font-bold text-slate-800 mb-2">
                                        Cargar Planilla de Calificaciones
                                    </h2>
                                    <p className="text-slate-500 text-sm max-w-md mx-auto mb-8">
                                        Arrastra aquí el archivo Excel del curso (`Libreta 1er año B_2.xlsx`). El sistema agrupará las asignaturas y dividirá la impresión en dos hojas de forma óptima.
                                    </p>

                                    <label className="cursor-pointer inline-flex items-center gap-2 px-6 py-3.5 bg-burgundy hover:bg-burgundy-dark text-white rounded-xl shadow-lg font-semibold text-sm transition-all transform hover:-translate-y-0.5">
                                        <Icon name="upload-cloud" className="w-5 h-5" />
                                        <span>Seleccionar Planilla Excel</span>
                                        <input 
                                            type="file" 
                                            accept=".xls,.xlsx" 
                                            onChange={handleFileChange} 
                                            className="hidden" 
                                        />
                                    </label>
                                </div>
                            </div>
                        ) : (
                            
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                                
                                <aside className="lg:col-span-3 bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm no-print">
                                    <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                                        <div className="relative">
                                            <Icon name="search" className="absolute left-3 top-2.5 h-4 w-4 text-slate-400" />
                                            <input 
                                                type="text" 
                                                placeholder="Filtrar estudiante..." 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full pl-9 pr-4 py-2 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus-ring-burgundy transition"
                                            />
                                        </div>
                                    </div>

                                    <div className="max-h-[500px] overflow-y-auto divide-y divide-slate-100 custom-scrollbar">
                                        {filteredStudents.map((student) => (
                                            <button
                                                key={student.nombre}
                                                onClick={() => setSelectedStudent(student)}
                                                className={`w-full text-left p-4 flex items-center justify-between transition ${
                                                    selectedStudent && selectedStudent.nombre === student.nombre 
                                                        ? "bg-burgundy-light/60 border-l-4 border-burgundy text-burgundy font-bold" 
                                                        : "hover:bg-slate-50 text-slate-700"
                                                }`}
                                            >
                                                <div className="min-w-0 pr-3">
                                                    <p className={`text-xs truncate ${
                                                        selectedStudent && selectedStudent.nombre === student.nombre ? "text-burgundy font-bold" : "text-slate-850"
                                                    }`}>
                                                        {student.nombre}
                                                    </p>
                                                    <p className="text-[10px] text-slate-400 mt-0.5">
                                                        {Object.keys(student.materias).length} Materias registradas
                                                    </p>
                                                </div>
                                                <Icon name="chevron-right" className={`w-3.5 h-3.5 shrink-0 transition ${
                                                    selectedStudent && selectedStudent.nombre === student.nombre ? "text-burgundy" : "text-slate-300"
                                                }`} />
                                            </button>
                                        ))}
                                    </div>

                                    <div className="p-4 bg-slate-50 border-t border-slate-150 flex flex-col gap-2">
                                        <button
                                            onClick={downloadAllPDFsAsZip}
                                            disabled={isBulkGenerating}
                                            className="w-full inline-flex items-center justify-center gap-2 py-2.5 px-4 bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 text-white rounded-lg font-bold text-xs transition shadow-md"
                                        >
                                            {isBulkGenerating ? (
                                                <div className="flex items-center gap-1.5 animate-pulse">
                                                    <span>Compilando {bulkProgress.current}/{bulkProgress.total}...</span>
                                                </div>
                                            ) : (
                                                <>
                                                    <Icon name="folder-archive" className="w-4 h-4" />
                                                    <span>Descargar ZIP del Curso</span>
                                                </>
                                            )}
                                        </button>
                                        <div className="text-center text-[10px] text-slate-400">
                                            Genera y empaqueta en ZIP las libretas de todo el curso con el formato oficial de dos hojas.
                                        </div>
                                    </div>
                                </aside>

                                <div className="lg:col-span-9 flex flex-col gap-4 print-container">
                                    
                                    {selectedStudent && (
                                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap items-center justify-between gap-3 shadow-sm no-print">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                                <span className="text-xs font-semibold text-slate-600">Visualizando:</span>
                                                <span className="text-xs font-bold text-burgundy bg-burgundy-light px-2.5 py-1 rounded border border-burgundy-light">
                                                    {selectedStudent.nombre}
                                                </span>
                                            </div>

                                            <div className="flex items-center gap-2">
                                                <button
                                                    onClick={() => downloadSinglePDF(selectedStudent)}
                                                    className="inline-flex items-center gap-1.5 px-3.5 py-2 bg-burgundy hover:bg-burgundy-dark text-white rounded-lg font-semibold text-xs transition shadow-sm"
                                                >
                                                    <Icon name="file-text" className="w-3.5 h-3.5" />
                                                    <span>Descargar PDF (2 Páginas)</span>
                                                </button>

                                                <button
                                                    onClick={() => window.print()}
                                                    className="inline-flex items-center gap-1.5 px-3.5 py-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 rounded-lg font-semibold text-xs transition"
                                                >
                                                    <Icon name="printer" className="w-3.5 h-3.5" />
                                                    <span>Imprimir Libreta</span>
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {selectedStudent ? (
                                        <div className="flex flex-col gap-8 print:gap-0">
                                            
                                            {/* ===== HOJA 1: NÚCLEOS 1 AL 4 ===== */}
                                            <div className="bg-white rounded-xl border border-slate-300 p-6 shadow-md print-card relative max-w-full overflow-hidden print:mb-0">
                                                <div className="flex flex-row justify-between items-start border-b-2 border-burgundy pb-3 mb-4 gap-4">
                                                    <div className="flex-1">
                                                        <h2 className="text-[10px] font-bold tracking-wider text-burgundy uppercase mb-1">
                                                            Colegio San José - Informe de Rendimiento Académico
                                                        </h2>
                                                        <h1 className="text-xl font-serif-elegant font-bold text-slate-800 tracking-tight leading-none uppercase">
                                                            {selectedCourseName}
                                                        </h1>
                                                        <p className="text-[9px] text-slate-400 mt-1 uppercase tracking-wider">
                                                            Nivel Secundario  |  Página 1 de 2
                                                        </p>
                                                    </div>

                                                    {logo && (
                                                        <img 
                                                            src={logo} 
                                                            alt="Logo Escuela" 
                                                            className="h-12 w-auto object-contain shrink-0 max-w-[140px]"
                                                        />
                                                    )}
                                                </div>

                                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 mb-4 grid grid-cols-3 gap-3 text-xs shadow-inner">
                                                    <div className="col-span-2">
                                                        <span className="text-burgundy uppercase text-[8px] font-bold block mb-0.5">ESTUDIANTE</span>
                                                        <span className="font-bold text-slate-800 text-sm uppercase">{selectedStudent.nombre}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-burgundy uppercase text-[8px] font-bold block mb-0.5">CURSO / SECCIÓN</span>
                                                        <span className="font-bold text-slate-800 text-sm">{selectedCourseName}</span>
                                                    </div>
                                                </div>

                                                <div className="mb-2">
                                                    <span className="inline-block bg-burgundy text-white text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">
                                                        PRIMERA PARTE: NÚCLEOS DE APRENDIZAJE 1 AL 4
                                                    </span>
                                                </div>

                                                {renderTableSection(selectedStudent, 1, 4)}

                                                <div className="mt-4 pt-2 border-t border-slate-200 flex justify-between items-center text-[9px] text-slate-400 font-semibold uppercase tracking-wider">
                                                    <span>Colegio San José  |  Documento Académico Oficial</span>
                                                    <span>PÁGINA 1 DE 2  |  Emitido el: {getFormattedDate()}</span>
                                                </div>
                                            </div>

                                            {/* ===== HOJA 2: NÚCLEOS 5 AL 8 ===== */}
                                            <div className="bg-white rounded-xl border border-slate-300 p-6 shadow-md print-card relative max-w-full overflow-hidden print-page-break">
                                                <div className="flex flex-row justify-between items-center border-b-2 border-burgundy pb-2 mb-3">
                                                    <div>
                                                        <h1 className="text-md font-serif-elegant font-bold text-slate-800 tracking-tight leading-none uppercase">
                                                            COLEGIO SAN JOSÉ
                                                        </h1>
                                                        <p className="text-[9px] text-slate-400 tracking-wider">
                                                            {selectedCourseName}  |  Página 2 de 2
                                                        </p>
                                                    </div>
                                                    <span className="text-[9.5px] font-bold text-slate-600 uppercase">Estudiante: {selectedStudent.nombre}</span>
                                                </div>

                                                <div className="mb-2">
                                                    <span className="inline-block bg-burgundy text-white text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">
                                                        SEGUNDA PARTE: NÚCLEOS DE APRENDIZAJE 5 AL 8
                                                    </span>
                                                </div>

                                                {renderTableSection(selectedStudent, 5, 8)}

                                                <div className="mt-6 pt-2 border-t border-slate-200 flex justify-between items-center text-[9px] text-slate-400 font-semibold uppercase tracking-wider">
                                                    <span>Colegio San José  |  Documento Académico Oficial</span>
                                                    <span>PÁGINA 2 DE 2  |  Emitido el: {getFormattedDate()}</span>
                                                </div>
                                            </div>

                                        </div>
                                    ) : (
                                        <div className="p-12 text-center text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            Selecciona un estudiante de la lista lateral para visualizar su libreta.
                                        </div>
                                    )}
                                </div>

                            </div>
                        )}
                    </main>

                    {/* Pie de página */}
                    <footer className="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-400 no-print mt-auto">
                        <p>© 2026 Colegio San José - Todos los derechos reservados.</p>
                    </footer>

                    {/* Notificación Toast */}
                    {toast && (
                        <div className="fixed bottom-4 right-4 z-50 no-print">
                            <div className={`px-4 py-2.5 rounded-lg shadow-xl text-white font-semibold text-xs flex items-center gap-2 ${
                                toast.type === "success" ? "bg-emerald-600" : toast.type === "error" ? "bg-red-600" : "bg-burgundy"
                            }`}>
                                <Icon name={toast.type === "success" ? "check-circle" : "alert-circle"} className="w-4 h-4" />
                                <span>{toast.message}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
